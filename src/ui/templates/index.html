<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockQuant Pro - 股票量化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1em;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        input, select, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        button {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .price {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }
        
        .price-up { color: #00ff88; }
        .price-down { color: #ff4444; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .info-label {
            color: rgba(255,255,255,0.6);
        }
        
        .info-value {
            font-weight: 500;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border: none;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }
        
        .signal-buy { color: #00ff88; }
        .signal-sell { color: #ff4444; }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.6);
        }
        
        .error {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 15px;
            color: #ff4444;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .backtest-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
        }

        .field-group input {
            width: 100%;
            padding: 10px 12px;
        }

        .backtest-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .meta-chip {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.78);
            font-size: 12px;
        }

        .chart-card {
            margin-bottom: 30px;
        }

        .chart-wrap {
            position: relative;
            height: 320px;
        }

        .table-note {
            margin-bottom: 12px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }

        .source-note {
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.78);
            font-size: 12px;
        }

        .source-badge {
            color: #00d4ff;
            font-weight: 600;
            text-transform: uppercase;
        }

        .optimize-list {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        .optimize-item {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .factor-grid {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .inline-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 StockQuant Pro</h1>
            <p class="subtitle">股票量化交易工具 | 数据分析 | 策略回测 | 信号生成</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="stockCode" placeholder="输入股票代码 (如 000002)" value="000002">
            <button onclick="searchStock()">查询</button>
            <button onclick="loadSignal()" style="background: linear-gradient(90deg, #ff6b6b, #ffa500);">📊 信号</button>
            <select id="strategySelect" onchange="runBacktest()">
                <option value="multi_factor" selected>多因子模型</option>
                <option value="dual_ma">双均线策略</option>
                <option value="macd">MACD策略</option>
                <option value="breakout">突破策略</option>
                <option value="rsi">RSI策略</option>
                <option value="boll_reversion">布林带均值回归</option>
                <option value="turtle_breakout">海龟突破策略</option>
                <option value="volume_breakout">放量突破策略</option>
            </select>
            <button onclick="runBacktest()">回测</button>
            <button onclick="optimizeBacktest()" style="background: linear-gradient(90deg, #22c55e, #0ea5e9);">优化参数</button>
            <button onclick="runWalkForward()" style="background: linear-gradient(90deg, #f59e0b, #ef4444);">滚动验证</button>
        </div>
        
        <div class="grid">
            <!-- 实时行情卡片 -->
            <div class="card">
                <h3>📊 实时行情</h3>
                <div id="realtimeData">
                    <div class="loading">输入股票代码查询</div>
                </div>
            </div>
            
            <!-- 交易信号卡片 -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3>🎯 交易信号</h3>
                    <div>
                        <button onclick="loadMonitorSignals()" style="padding: 6px 12px; font-size: 12px; margin-right: 8px;">🔄 刷新</button>
                        <label style="display: inline-flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()" style="width: auto; margin-right: 5px;">
                            <span style="font-size: 12px;">自动</span>
                        </label>
                    </div>
                </div>
                <div id="signalData">
                    <div class="loading">点击上方“信号”按钮查看当前股票的指标详情、历史验证和最近信号。</div>
                </div>
                <div id="monitorSignals">
                    <div class="loading">点击刷新获取信号</div>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.5); text-align: center;">
                    <span id="monitorStatus">点击刷新获取最新信号</span>
                </div>
            </div>
            
            <!-- 回测结果卡片 -->
            <div class="card">
                <h3>🎯 回测结果</h3>
                <div class="backtest-panel">
                    <div class="field-group">
                        <label for="initialCapital">初始资金</label>
                        <input type="number" id="initialCapital" value="100000" min="1000" step="1000">
                    </div>
                    <div class="field-group">
                        <label for="positionSize">仓位比例</label>
                        <input type="number" id="positionSize" value="0.95" min="0.1" max="1" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="commissionRate">手续费率</label>
                        <input type="number" id="commissionRate" value="0.0003" min="0" step="0.0001">
                    </div>
                    <div class="field-group">
                        <label for="stampDutyRate">印花税率</label>
                        <input type="number" id="stampDutyRate" value="0.001" min="0" step="0.0001">
                    </div>
                    <div class="field-group">
                        <label for="slippageRate">滑点率</label>
                        <input type="number" id="slippageRate" value="0.0005" min="0" step="0.0001">
                    </div>
                    <div class="field-group">
                        <label for="stopLossPct">止损比例</label>
                        <input type="number" id="stopLossPct" value="0" min="0" step="0.01" placeholder="如 0.08">
                    </div>
                    <div class="field-group">
                        <label for="takeProfitPct">止盈比例</label>
                        <input type="number" id="takeProfitPct" value="0" min="0" step="0.01" placeholder="如 0.15">
                    </div>
                    <div class="field-group">
                        <label for="trailingStopPct">移动止损</label>
                        <input type="number" id="trailingStopPct" value="0" min="0" step="0.01" placeholder="如 0.1">
                    </div>
                    <div class="field-group">
                        <label for="atrPeriod">ATR 周期</label>
                        <input type="number" id="atrPeriod" value="14" min="1" step="1">
                    </div>
                    <div class="field-group">
                        <label for="atrStopMultiplier">ATR 止损倍数</label>
                        <input type="number" id="atrStopMultiplier" value="0" min="0" step="0.1" placeholder="如 2.0">
                    </div>
                    <div class="field-group">
                        <label for="partialTakeProfitPct">分批止盈触发</label>
                        <input type="number" id="partialTakeProfitPct" value="0" min="0" step="0.01" placeholder="如 0.1">
                    </div>
                    <div class="field-group">
                        <label for="partialTakeProfitRatio">分批止盈比例</label>
                        <input type="number" id="partialTakeProfitRatio" value="0.5" min="0" max="1" step="0.1">
                    </div>
                    <div class="field-group">
                        <label for="fastMa">快线周期</label>
                        <input type="number" id="fastMa" value="5" min="2" step="1">
                    </div>
                    <div class="field-group">
                        <label for="slowMa">慢线周期</label>
                        <input type="number" id="slowMa" value="20" min="3" step="1">
                    </div>
                    <div class="field-group">
                        <label for="strategyPeriod">通用周期</label>
                        <input type="number" id="strategyPeriod" value="20" min="2" step="1">
                    </div>
                    <div class="field-group">
                        <label for="oversoldValue">RSI超卖</label>
                        <input type="number" id="oversoldValue" value="20" min="1" max="50" step="1">
                    </div>
                    <div class="field-group">
                        <label for="overboughtValue">RSI超买</label>
                        <input type="number" id="overboughtValue" value="80" min="50" max="99" step="1">
                    </div>
                    <div class="field-group">
                        <label for="buyThreshold">买入阈值</label>
                        <input type="number" id="buyThreshold" value="0.55" min="0" max="1" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="sellThreshold">卖出阈值</label>
                        <input type="number" id="sellThreshold" value="0.45" min="0" max="1" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="volumePeriod">量能周期</label>
                        <input type="number" id="volumePeriod" value="10" min="2" step="1">
                    </div>
                    <div class="field-group">
                        <label for="minFactorPassCount">最少通过因子数</label>
                        <input type="number" id="minFactorPassCount" value="2" min="1" step="1">
                    </div>
                    <div class="field-group">
                        <label for="useTrendFactor">启用趋势因子</label>
                        <select id="useTrendFactor">
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="useMomentumFactor">启用动量因子</label>
                        <select id="useMomentumFactor">
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="useReversionFactor">启用回归因子</label>
                        <select id="useReversionFactor">
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="useVolumeFactor">启用量能因子</label>
                        <select id="useVolumeFactor">
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="trendWeight">趋势权重</label>
                        <input type="number" id="trendWeight" value="0.35" min="0" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="momentumWeight">动量权重</label>
                        <input type="number" id="momentumWeight" value="0.30" min="0" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="reversionWeight">回归权重</label>
                        <input type="number" id="reversionWeight" value="0.20" min="0" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="volumeWeight">量能权重</label>
                        <input type="number" id="volumeWeight" value="0.15" min="0" step="0.05">
                    </div>
                    <div class="field-group">
                        <label for="optimizeMetric">优化指标</label>
                        <select id="optimizeMetric">
                            <option value="total_return">总收益</option>
                            <option value="sharpe_ratio">夏普比率</option>
                            <option value="excess_return">超额收益</option>
                            <option value="return_over_drawdown">收益回撤比</option>
                            <option value="balanced">平衡评分</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="fastMaRange">快线候选</label>
                        <input type="text" id="fastMaRange" value="3,5,8,10" placeholder="3,5,8,10">
                    </div>
                    <div class="field-group">
                        <label for="slowMaRange">慢线候选</label>
                        <input type="text" id="slowMaRange" value="15,20,30,60" placeholder="15,20,30,60">
                    </div>
                    <div class="field-group">
                        <label for="periodRange">周期候选</label>
                        <input type="text" id="periodRange" value="10,20,30,60" placeholder="10,20,30,60">
                    </div>
                    <div class="field-group">
                        <label for="oversoldRange">超卖候选</label>
                        <input type="text" id="oversoldRange" value="20,25,30" placeholder="20,25,30">
                    </div>
                    <div class="field-group">
                        <label for="overboughtRange">超买候选</label>
                        <input type="text" id="overboughtRange" value="70,75,80" placeholder="70,75,80">
                    </div>
                    <div class="field-group">
                        <label for="buyThresholdRange">买入阈值候选</label>
                        <input type="text" id="buyThresholdRange" value="0.5,0.55,0.6" placeholder="0.5,0.55,0.6">
                    </div>
                    <div class="field-group">
                        <label for="sellThresholdRange">卖出阈值候选</label>
                        <input type="text" id="sellThresholdRange" value="0.35,0.4,0.45" placeholder="0.35,0.4,0.45">
                    </div>
                    <div class="field-group">
                        <label for="minFactorPassCountRange">通过因子数候选</label>
                        <input type="text" id="minFactorPassCountRange" value="2,3" placeholder="2,3">
                    </div>
                    <div class="field-group">
                        <label for="trendWeightRange">趋势权重候选</label>
                        <input type="text" id="trendWeightRange" value="0.2,0.35,0.5" placeholder="0.2,0.35,0.5">
                    </div>
                    <div class="field-group">
                        <label for="momentumWeightRange">动量权重候选</label>
                        <input type="text" id="momentumWeightRange" value="0.2,0.3,0.4" placeholder="0.2,0.3,0.4">
                    </div>
                    <div class="field-group">
                        <label for="reversionWeightRange">回归权重候选</label>
                        <input type="text" id="reversionWeightRange" value="0.1,0.2,0.3" placeholder="0.1,0.2,0.3">
                    </div>
                    <div class="field-group">
                        <label for="volumeWeightRange">量能权重候选</label>
                        <input type="text" id="volumeWeightRange" value="0.1,0.15,0.25" placeholder="0.1,0.15,0.25">
                    </div>
                    <div class="field-group">
                        <label for="minTrades">最少成交</label>
                        <input type="number" id="minTrades" value="1" min="0" step="1">
                    </div>
                    <div class="field-group">
                        <label for="maxDrawdownLimit">回撤上限%</label>
                        <input type="number" id="maxDrawdownLimit" value="" min="0" step="0.5" placeholder="如 15">
                    </div>
                    <div class="field-group">
                        <label for="minSharpe">最小夏普</label>
                        <input type="number" id="minSharpe" value="" step="0.1" placeholder="如 0.8">
                    </div>
                    <div class="field-group">
                        <label for="minExcessReturn">最小超额%</label>
                        <input type="number" id="minExcessReturn" value="" step="0.5" placeholder="如 5">
                    </div>
                    <div class="field-group">
                        <label for="trainSize">训练窗口</label>
                        <input type="number" id="trainSize" value="120" min="20" step="10">
                    </div>
                    <div class="field-group">
                        <label for="testSize">测试窗口</label>
                        <input type="number" id="testSize" value="60" min="20" step="10">
                    </div>
                    <div class="field-group">
                        <label for="stepSize">滚动步长</label>
                        <input type="number" id="stepSize" value="60" min="10" step="10">
                    </div>
                </div>
                <div id="backtestData">
                    <div class="loading">选择策略并点击回测</div>
                </div>
                <div id="factorData" class="optimize-list"></div>
                <div id="optimizeData" class="optimize-list"></div>
                <div id="walkforwardData" class="optimize-list"></div>
            </div>
        </div>

        <div class="card chart-card">
            <h3>📈 回测净值曲线</h3>
            <div class="chart-wrap">
                <canvas id="backtestChart"></canvas>
            </div>
        </div>
        
        <!-- K线数据 -->
        <div class="card">
            <h3>📉 日K线数据</h3>
            <div id="klineSource" class="source-note">数据来源: <span class="source-badge">加载中</span></div>
            <div class="tabs">
                <div class="tab active" onclick="showTab('kline')">日K线</div>
                <div class="tab" onclick="showTab('trades')">交易记录</div>
            </div>
            <div id="klineData" class="tab-content active">
                <div class="loading">请先查询股票</div>
            </div>
            <div id="tradesData" class="tab-content">
                <div class="loading">暂无交易记录</div>
            </div>
        </div>
    </div>
    
    <script>
        let currentData = null;
        let refreshTimer = null;
        let autoRefreshInterval = null;
        let backtestChart = null;
        let lastOptimizeResults = [];
        
        // 页面加载完成后自动获取监控信号
        window.addEventListener('load', function() {
            loadMonitorSignals();
            // 页面加载时自动查询默认股票的K线数据
            loadKlineData('000002');
            searchStock();
            runBacktest();
        });

        function toFixedSafe(value, digits = 2) {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(digits) : '-';
        }

        function getBacktestParams() {
            return {
                initial_capital: document.getElementById('initialCapital').value,
                position_size: document.getElementById('positionSize').value,
                commission_rate: document.getElementById('commissionRate').value,
                stamp_duty_rate: document.getElementById('stampDutyRate').value,
                slippage_rate: document.getElementById('slippageRate').value,
                stop_loss_pct: document.getElementById('stopLossPct').value,

        function formatDateYmd(value) {
            if (!value) return '-';
            const raw = String(value);
            const matched = raw.match(/^(\d{4})[-/](\d{2})[-/](\d{2})/);
            if (matched) {
                return `${matched[1]}-${matched[2]}-${matched[3]}`;
            }
            const date = new Date(raw);
            if (Number.isNaN(date.getTime())) {
                return raw.substring(0, 10);
            }
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        }

        async function optimizeBacktest() {
            const code = document.getElementById('stockCode').value;
            const strategy = document.getElementById('strategySelect').value;
            const params = getBacktestParams();
            const optimizeParams = getOptimizeParams();
            const container = document.getElementById('optimizeData');
            document.getElementById('walkforwardData').innerHTML = '';
            container.innerHTML = '<div class="loading">参数优化中...</div>';

            try {
                const query = new URLSearchParams({
                    code,
                    strategy,
                    ...params
                    ,
                    ...optimizeParams
                });
                const response = await fetch(`/api/backtest/optimize?${query.toString()}`);
                const result = await response.json();

                if (!result.success) {
                    lastOptimizeResults = [];
                    container.innerHTML = `<div class="error">${result.error}</div>`;
                    return;
                }

                lastOptimizeResults = result.top_results || [];
                let html = `<div class="table-note">已评估 ${result.evaluated} 组参数，过滤 ${result.filtered_out || 0} 组，按 ${result.metric} 排序。搜索范围 ${JSON.stringify(result.param_ranges || {})}，约束 ${JSON.stringify(result.constraints || {})}</div>`;
                if (result.stability_summary && result.stability_summary.length > 0) {
                    html += `<div class="table-note">参数稳定性: ${result.stability_summary.slice(0, 3).map(item => `${JSON.stringify(item.params)} x${item.count}`).join(' | ')}</div>`;
                }
                if (!result.top_results || result.top_results.length === 0) {
                    container.innerHTML = html + '<div class="error">当前筛选条件下没有符合要求的参数组合，请放宽约束后重试。</div>';
                    return;
                }
                for (const [index, item] of result.top_results.entries()) {
                    html += `
                        <div class="optimize-item">
                            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
                                <strong>Top ${index + 1}: ${JSON.stringify(item.params)}</strong>
                                <span style="color:#00d4ff;">得分 ${toFixedSafe(item.score, 2)}</span>
                            </div>
                            <div class="backtest-meta">
                                <span class="meta-chip">收益 ${toFixedSafe(item.metrics.total_return, 1)}%</span>
                                <span class="meta-chip">超额 ${toFixedSafe(item.metrics.excess_return, 1)}%</span>
                                <span class="meta-chip">年化 ${toFixedSafe(item.metrics.annual_return, 1)}%</span>
                                <span class="meta-chip">回撤 ${toFixedSafe(item.metrics.max_drawdown, 1)}%</span>
                                <span class="meta-chip">夏普 ${toFixedSafe(item.metrics.sharpe_ratio, 2)}</span>
                                <span class="meta-chip">胜率 ${toFixedSafe(item.metrics.win_rate, 1)}%</span>
                            </div>
                            <div class="inline-actions">
                                <button class="btn-small" onclick="applyOptimizedParams(${index})">应用并回测</button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (e) {
                lastOptimizeResults = [];
                container.innerHTML = `<div class="error">优化失败: ${e.message}</div>`;
            }
        }

        async function runWalkForward() {
            const code = document.getElementById('stockCode').value;
            const strategy = document.getElementById('strategySelect').value;
            const params = getBacktestParams();
            const optimizeParams = getOptimizeParams();
            const walkforwardParams = getWalkForwardParams();
            const container = document.getElementById('walkforwardData');
            container.innerHTML = '<div class="loading">滚动验证中...</div>';

            try {
                const query = new URLSearchParams({
                    code,
                    strategy,
                    ...params,
                    ...optimizeParams,
                    ...walkforwardParams
                });
                const response = await fetch(`/api/backtest/walkforward?${query.toString()}`);
                const result = await response.json();

                if (!result.success) {
                    container.innerHTML = `<div class="error">${result.error}</div>`;
                    return;
                }

                renderBacktestChart(result.equity_curve || [], result.benchmark_curve || []);

                let html = `
                    <div class="table-note">
                        滚动验证 ${result.segments.length} 段，窗口 train=${result.train_size} / test=${result.test_size} / step=${result.step_size}。
                        总收益 ${toFixedSafe(result.metrics.total_return, 1)}%，基准 ${toFixedSafe(result.benchmark_metrics.total_return, 1)}%。
                    </div>
                `;
                if (result.stability_summary && result.stability_summary.length > 0) {
                    html += `<div class="table-note">参数稳定性: ${result.stability_summary.slice(0, 5).map(item => `${JSON.stringify(item.params)} x${item.count}`).join(' | ')}</div>`;
                }

                for (const [index, item] of result.segments.entries()) {
                    html += `
                        <div class="optimize-item">
                            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
                                <strong>Segment ${index + 1}: ${item.test_start} ~ ${item.test_end}</strong>
                                <span style="color:#00d4ff;">${JSON.stringify(item.best_params)}</span>
                            </div>
                            <div class="backtest-meta">
                                <span class="meta-chip">训练 ${item.train_start} ~ ${item.train_end}</span>
                                <span class="meta-chip">收益 ${toFixedSafe(item.metrics.total_return, 1)}%</span>
                                <span class="meta-chip">超额 ${toFixedSafe(item.metrics.excess_return, 1)}%</span>
                                <span class="meta-chip">回撤 ${toFixedSafe(item.metrics.max_drawdown, 1)}%</span>
                                <span class="meta-chip">夏普 ${toFixedSafe(item.metrics.sharpe_ratio, 2)}</span>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="error">滚动验证失败: ${e.message}</div>`;
            }
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Data').classList.add('active');
        }
        
        // 蜡烛图
        let candleChart = null;
        
        function renderCandleChart(data) {
            const ctx = document.getElementById('candleChart').getContext('2d');
            
            // 准备数据
            const labels = data.map(d => d.date.substring(0, 10));
            const ohlc = data.map(d => ({
                x: d.date.substring(0, 10),
                o: d.open,
                h: d.high,
                l: d.low,
                c: d.close
            }));
            
            // 销毁旧图表
            if (candleChart) {
                candleChart.destroy();
            }
            
            // 计算MA5, MA10, MA20
            const ma5 = data.map((d, i) => i >= 4 ? d.ma5 : null);
            const ma10 = data.map((d, i) => i >= 9 ? d.ma10 : null);
            const ma20 = data.map((d, i) => i >= 19 ? d.ma20 : null);
            
            // 创建蜡烛图数据
            const candleData = {
                labels: labels,
                datasets: [{
                    label: '蜡烛图',
                    data: ohlc,
                    type: 'bar',
                    backgroundColor: data.map(d => d.close >= d.open ? '#00ff88' : '#ff4444'),
                    borderColor: data.map(d => d.close >= d.open ? '#00ff88' : '#ff4444'),
                    borderWidth: 1,
                    order: 2
                }]
            };
            
            // 创建图表
            candleChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: 'MA5',
                            data: ma5,
                            borderColor: '#ff00ff',
                            borderWidth: 1,
                            pointRadius: 0,
                            tension: 0,
                            order: 1
                        },
                        {
                            type: 'line',
                            label: 'MA10',
                            data: ma10,
                            borderColor: '#ffff00',
                            borderWidth: 1,
                            pointRadius: 0,
                            tension: 0,
                            order: 1
                        },
                        {
                            type: 'line',
                            label: 'MA20',
                            data: ma20,
                            borderColor: '#00ffff',
                            borderWidth: 1,
                            pointRadius: 0,
                            tension: 0,
                            order: 1
                        },
                        {
                            type: 'bar',
                            label: '涨跌',
                            data: data.map(d => d.close - d.open),
                            backgroundColor: data.map(d => d.close >= d.open ? 'rgba(0,255,136,0.3)' : 'rgba(255,68,68,0.3)'),
                            order: 3,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888', maxTicksLimit: 15 }
                        },
                        y: {
                            position: 'right',
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        },
                        y1: {
                            position: 'left',
                            display: false,
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.type === 'bar') return null;
                                    const d = context.raw;
                                    if (typeof d === 'object' && d !== null) {
                                        return `开盘: ${d.o.toFixed(2)} 最高: ${d.h.toFixed(2)} 最低: ${d.l.toFixed(2)} 收盘: ${d.c.toFixed(2)}`;
                                    }
                                    return context.dataset.label + ': ' + (d ? d.toFixed(2) : '-');
                                }
                            }
                        }
                    }
                }
            });
        }

        // 加载交易信号
        async function loadSignal() {
            const code = document.getElementById('stockCode').value;
            if (!code) return;
            
            document.getElementById('signalData').innerHTML = '<div class="loading">分析中...</div>';
            
            try {
                const response = await fetch(`/api/signal?code=${code}&days=60`);
                const result = await response.json();
                
                if (!result.success) {
                    document.getElementById('signalData').innerHTML = `<div class="error">${result.error}</div>`;
                    return;
                }
                
                const signal = result.signal;
                const reason = result.reason;
                const strength = result.strength;
                const signalPrice = Number(result.signal_price || 0);
                const marketPrice = Number(result.market_price || signalPrice);
                const signalBasis = result.signal_basis || '日线信号';
                const marketPriceBasis = result.market_price_basis || '价格参考';
                const signalDataSource = result.signal_data_source || '';
                const marketPriceSource = result.market_price_source || signalDataSource;
                const signalDate = result.signal_date || '-';
                const details = result.details || {};
                const indicatorSignals = details.signals || [];
                const validation = result.validation || {};
                
                let color = '#888';
                let icon = '➡️';
                let bgColor = 'rgba(136,136,136,0.2)';
                
                if (signal === 'buy') {
                    color = '#00ff88';
                    icon = '🟢 买入';
                    bgColor = 'rgba(0,255,136,0.2)';
                } else if (signal === 'sell') {
                    color = '#ff4444';
                    icon = '🔴 卖出';
                    bgColor = 'rgba(255,68,68,0.2)';
                }
                
                // 强度条
                const strengthPercent = Math.round(strength * 100);
                
                let detailsHtml = '';
                if (indicatorSignals.length > 0) {
                    detailsHtml = '<div style="margin-top:15px;"><strong>指标详情:</strong></div>';
                    for (const d of indicatorSignals) {
                        let dColor = '#888';
                        if (d.signal === 'buy') dColor = '#00ff88';
                        if (d.signal === 'sell') dColor = '#ff4444';
                        detailsHtml += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                            <span>${d.indicator}</span>
                            <span style="color:${dColor}">${d.reason} (${Math.round((d.strength || 0) * 100)}%)</span>
                        </div>`;
                    }
                }

                let validationHtml = '';
                const summary = validation.summary || {};
                const buySummary = validation.buy_summary || {};
                const sellSummary = validation.sell_summary || {};
                const horizons = Object.keys(summary);
                if (horizons.length > 0) {
                    validationHtml = '<div style="margin-top:15px;"><strong>历史验证:</strong></div>';
                    validationHtml += `<div style="font-size:0.85em;color:rgba(255,255,255,0.65);margin:6px 0 10px;">样本信号 ${validation.signal_count || 0} 次，买入 ${validation.buy_count || 0} 次，卖出 ${validation.sell_count || 0} 次</div>`;
                    for (const horizon of horizons) {
                        const item = summary[horizon];
                        const avgColor = Number(item.avg_return) >= 0 ? '#00ff88' : '#ff4444';
                        validationHtml += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                            <span>${horizon}日后</span>
                            <span><span style="color:${avgColor}">均值 ${toFixedSafe(item.avg_return, 2)}%</span> / 命中 ${toFixedSafe(item.hit_rate, 1)}%</span>
                        </div>`;
                    }
                    validationHtml += '<div style="margin-top:10px;font-size:0.85em;color:rgba(255,255,255,0.75);"><strong>分方向统计:</strong></div>';
                    for (const horizon of horizons) {
                        const buyItem = buySummary[horizon] || {};
                        const sellItem = sellSummary[horizon] || {};
                        validationHtml += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                            <span>${horizon}日后买/卖</span>
                            <span>买 ${toFixedSafe(buyItem.hit_rate, 1)}% / 卖 ${toFixedSafe(sellItem.hit_rate, 1)}%</span>
                        </div>`;
                    }
                } else {
                    validationHtml = '<div style="margin-top:15px;"><strong>历史验证:</strong><div style="margin-top:8px;font-size:0.85em;color:rgba(255,255,255,0.6);">当前样本内还没有形成足够的历史买卖信号，暂时无法给出命中率统计。</div></div>';
                }

                let historyHtml = '';
                const recentSignals = validation.recent_signals || [];
                if (recentSignals.length > 0) {
                    historyHtml = '<div style="margin-top:15px;"><strong>最近信号:</strong></div>';
                    historyHtml += '<div style="overflow-x:auto;margin-top:8px;"><table style="font-size:12px;"><thead><tr><th>日期</th><th>方向</th><th>原因</th><th>3日</th><th>5日</th><th>10日</th></tr></thead><tbody>';
                    for (const item of recentSignals.slice().reverse()) {
                        const rowColor = item.signal === 'buy' ? '#00ff88' : '#ff4444';
                        const returns = item.forward_returns || {};
                        const returnCell = (value, signalType) => {
                            const number = Number(value || 0);
                            const isPositive = signalType === 'buy' ? number >= 0 : number <= 0;
                            const cellColor = isPositive ? '#00ff88' : '#ff4444';
                            return `<span style="color:${cellColor}">${toFixedSafe(number, 2)}%</span>`;
                        };
                        historyHtml += `<tr>
                            <td>${item.date}</td>
                            <td style="color:${rowColor}">${item.signal === 'buy' ? '买入' : '卖出'}</td>
                            <td>${item.reason}</td>
                            <td>${returnCell(returns['3'], item.signal)}</td>
                            <td>${returnCell(returns['5'], item.signal)}</td>
                            <td>${returnCell(returns['10'], item.signal)}</td>
                        </tr>`;
                    }
                    historyHtml += '</tbody></table></div>';
                } else {
                    historyHtml = '<div style="margin-top:15px;"><strong>最近信号:</strong><div style="margin-top:8px;font-size:0.85em;color:rgba(255,255,255,0.6);">最近窗口内没有形成可复盘的买卖触发，这通常意味着当前更偏震荡或信号阈值较严。</div></div>';
                }
                
                document.getElementById('signalData').innerHTML = `
                    <div style="text-align:center;padding:20px;background:${bgColor};border-radius:10px;">
                        <div style="font-size:3em;color:${color}">${icon}</div>
                        <div style="font-size:1.5em;font-weight:bold;color:${color};margin:10px 0;">
                            ${signal === 'buy' ? '建议买入' : signal === 'sell' ? '建议卖出' : '观望'}
                        </div>
                        <div style="color:#fff;margin-bottom:10px;">${reason}</div>
                        <div style="font-size:0.9em;color:rgba(255,255,255,0.6);">信号日期: ${signalDate} | ${signalBasis}</div>
                        <div style="font-size:0.9em;color:rgba(255,255,255,0.6);margin-top:4px;">信号价格: ¥${signalPrice.toFixed(2)} | 市场价格: ¥${marketPrice.toFixed(2)}</div>
                        <div style="font-size:0.8em;color:rgba(255,255,255,0.5);margin-top:4px;">信号数据源: ${formatSourceLabel(signalDataSource)} | 价格参考源: ${formatSourceLabel(marketPriceSource)}</div>
                        <div style="font-size:0.8em;color:rgba(255,255,255,0.5);margin-top:4px;">${marketPriceBasis}</div>
                        <div style="margin-top:15px;">
                            <div style="display:flex;justify-content:space-between;font-size:0.8em;color:rgba(255,255,255,0.6);">
                                <span>信号强度</span>
                                <span>${strengthPercent}%</span>
                            </div>
                            <div style="height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin-top:5px;">
                                <div style="height:100%;width:${strengthPercent}%;background:${color};border-radius:4px;"></div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:12px;padding:16px;background:rgba(255,255,255,0.04);border-radius:10px;text-align:left;">${detailsHtml || '<strong>指标详情:</strong><div style="margin-top:8px;font-size:0.85em;color:rgba(255,255,255,0.6);">当前没有可展开的指标明细。</div>'}</div>
                    <div style="margin-top:12px;padding:16px;background:rgba(255,255,255,0.04);border-radius:10px;text-align:left;">${validationHtml}</div>
                    <div style="margin-top:12px;padding:16px;background:rgba(255,255,255,0.04);border-radius:10px;text-align:left;">${historyHtml}</div>
                `;
                
            } catch (e) {
                document.getElementById('signalData').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
            }
        }
        
        // 页面加载时自动查询默认股票
        searchStock();
        
        // 每3秒自动刷新行情
        const codeInput = document.getElementById('stockCode');
        refreshTimer = setInterval(() => {
            const code = codeInput.value;
            if (code) {
                // 重新获取实时行情（不显示loading）
                fetch(`/api/realtime?code=${code}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.error && data.price) {
                            const changeClass = data.change >= 0 ? 'price-up' : 'price-down';
                            const changeSign = data.change >= 0 ? '+' : '';
                            // 更新价格
                            document.querySelector('.price').textContent = (data.price || 0).toFixed(2);
                            document.querySelector('.price').className = `price ${changeClass}`;
                            // 更新涨跌幅显示
                            const infoRows = document.querySelectorAll('.info-row');
                            infoRows.forEach(row => {
                                const label = row.querySelector('.info-label');
                                const value = row.querySelector('.info-value');
                                if (label && label.textContent === '涨跌幅' && value) {
                                    value.textContent = `${changeSign}${(data.change || 0).toFixed(2)}%`;
                                    value.className = `info-value ${changeClass}`;
                                }
                                if (label && label.textContent === '涨跌额' && value) {
                                    value.textContent = `${changeSign}${(data.change_amount || 0).toFixed(2)}`;
                                    value.className = `info-value ${changeClass}`;
                                }
                            });
                        }
                    });
            }
        }, 3000);
    </script>
</body>
</html>
