name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-gui.txt

      - name: Compile source
        run: |
          python -m py_compile src/ui/prod_server.py src/ui/web_app.py src/main.py scripts/stock_monitor.py scripts/stock_signal_monitor.py

      - name: Run unit tests
        run: |
          python -m unittest tests.test_backtest_engine
